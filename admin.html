<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Water Tracker - Professional Admin</title>
    <style>
        :root {
            --bg: #050505;
            --card: #0f1115;
            --border: #1e2631;
            --accent: #00d4ff; /* Pure Blue */
            --accent-soft: #a288ff; /* Softener Purple */
            --accent-dual: #34c759; /* Dual Green */
            --accent-warn: #ffcc00;
            --text: #e6edf3;
            --sub: #7d8590;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'SF Mono', 'Fira Code', 'Inter', monospace;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 40px;
        }
        /* ログイン・ローディングは前バージョンを継承 */
        #loginScreen, #loading { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
        .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 360px; display: flex; flex-direction: column; gap: 16px; }
        .login-input { background: #000; border: 1px solid var(--border); border-radius: 10px; color: var(--accent); padding: 14px; outline: none; text-align: center; font-size: 18px; }
        
        /* Dashboard Layout */
        #dashboard { display: none; }
        .header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; background: rgba(5,5,5,0.8); backdrop-filter: blur(10px); z-index: 100; }
        .container { max-width: 1000px; margin: 24px auto; padding: 0 20px; }
        
        /* KPIs */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; position: relative; overflow: hidden; }
        .kpi-card::after { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent); }
        .kpi-card.softener::after { background: var(--accent-soft); }
        .kpi-card.dual::after { background: var(--accent-dual); }
        .kpi-label { font-size: 10px; color: var(--sub); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
        .kpi-val { font-size: 28px; font-weight: 800; color: var(--text); }
        
        /* Sections */
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 24px; }
        .section-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
        .section-body { padding: 20px; }

        /* Custom Tags Cloud */
        .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag-item { background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.2); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 11px; }

        /* Data List */
        .recent-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .recent-table th { text-align: left; padding: 12px 8px; color: var(--sub); border-bottom: 1px solid var(--border); }
        .recent-table td { padding: 12px 8px; border-bottom: 1px solid var(--border); }
        
        .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .bg-soft { background: rgba(162,136,255,0.2); color: var(--accent-soft); }
        .bg-dual { background: rgba(52,199,89,0.2); color: var(--accent-dual); }
    </style>
</head>
<body>

<div id="loginScreen">
    <div style="text-align:center">
        <h2 style="color:var(--accent)">PURE WATER TRACKER</h2>
        <p style="color:var(--sub); font-size:10px; margin-top:4px;">ADMINISTRATION INTERFACE</p>
    </div>
    <div class="login-box">
        <input type="password" id="passInput" class="login-input" placeholder="Passkey">
        <button onclick="login()" style="background:var(--accent); border:none; padding:14px; border-radius:10px; font-weight:bold; cursor:pointer;">認証</button>
    </div>
</div>

<div id="dashboard">
    <div class="header">
        <div style="font-weight:bold; letter-spacing:1px;">SYSTEM MONITOR</div>
        <div id="time" style="font-size:12px; color:var(--sub)"></div>
    </div>

    <div class="container">
        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-label">総ユーザー数</div>
                <div class="kpi-val" id="totalUser">--</div>
            </div>
            <div class="kpi-card softener">
                <div class="kpi-label">軟水機モード</div>
                <div class="kpi-val" id="softenerUser" style="color:var(--accent-soft)">--</div>
            </div>
            <div class="kpi-card dual">
                <div class="kpi-label">2連結ユーザー</div>
                <div class="kpi-val" id="dualUser" style="color:var(--accent-dual)">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">平均原水硬度</div>
                <div class="kpi-val" id="avgPpm" style="color:var(--accent-warn)">--</div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">施工タグ トレンド (直近200件)</div>
            <div class="section-body">
                <div id="tagCloud" class="tag-cloud">
                    </div>
            </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div class="section">
                <div class="section-header">都道府県分布</div>
                <div class="section-body" id="prefList"></div>
            </div>
            <div class="section">
                <div class="section-header">軟水機メーカー分布</div>
                <div class="section-body" id="softenerList"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                アクティビティログ
                <span style="font-size:10px; font-weight:normal; color:var(--sub)">Mode / Manufacturer / PPM / Tags</span>
            </div>
            <div class="section-body" style="padding:0">
                <table class="recent-table">
                    <thead>
                        <tr>
                            <th>日時</th>
                            <th>モード</th>
                            <th>構成</th>
                            <th>PPM</th>
                            <th>最新施工</th>
                        </tr>
                    </thead>
                    <tbody id="logTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // GASのURLは適宜最新に書き換えてください
    const API_URL = 'https://script.google.com/macros/s/AKfycbwnz-HMQHlkslJ3QGUwdpZWfu5FlL76kLA8Qr6217pmPlB037FuM2J1JES5Es6FN9Vl/exec';
    let pass = "";

    function login() {
        pass = document.getElementById('passInput').value;
        document.getElementById('loginScreen').style.display = 'none';
        fetchData();
    }

    async function fetchData() {
        const res = await fetch(`${API_URL}?pass=${encodeURIComponent(pass)}`);
        const data = await res.json();
        
        document.getElementById('dashboard').style.display = 'block';
        render(data);
    }

    function render(data) {
        // KPI
        document.getElementById('totalUser').innerText = data.total || 0;
        document.getElementById('softenerUser').innerText = data.softenerCount || 0;
        document.getElementById('dualUser').innerText = data.dualCount || 0;
        document.getElementById('avgPpm').innerText = (data.avgPpm || 0) + 'ppm';

        // Tag Cloud (施工内容の可視化)
        const tagContainer = document.getElementById('tagCloud');
        if (data.popularTags) {
            tagContainer.innerHTML = data.popularTags.map(t => `
                <div class="tag-item">${t.name} (${t.count})</div>
            `).join('');
        }

        // Log Table
        const logTable = document.getElementById('logTable');
        logTable.innerHTML = data.recent.map(r => `
            <tr>
                <td style="color:var(--sub)">${r.date}</td>
                <td>
                    ${r.isSoftener ? '<span class="badge bg-soft">SOFT</span>' : ''}
                    ${r.isDual ? '<span class="badge bg-dual">DUAL</span>' : ''}
                </td>
                <td>
                    <div style="font-weight:bold">${r.manufacturer}</div>
                    <div style="font-size:9px; color:var(--sub)">${r.isDual ? '+ ' + r.sub_manufacturer : ''}</div>
                </td>
                <td style="color:var(--accent-warn)">${r.ppm}</td>
                <td>${r.lastTags || '-'}</td>
            </tr>
        `).join('');
    }

    setInterval(() => {
        document.getElementById('time').innerText = new Date().toLocaleString();
    }, 1000);
</script>
</body>
</html>
