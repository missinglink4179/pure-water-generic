<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pure Water Analytics Admin</title>

<style>

:root{
--bg:#050505;
--card:#0f1115;
--border:#1e2631;

--accent:#00d4ff;
--accent-soft:#a288ff;
--accent-dual:#34c759;
--accent-warn:#ffcc00;

--text:#e6edf3;
--sub:#7d8590;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:
'SF Mono',
'Inter',
monospace;

background:var(--bg);

color:var(--text);

padding-bottom:40px;
}

#loginScreen,
#loading{

min-height:100vh;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

gap:24px;

}

.login-box{

background:var(--card);

border:1px solid var(--border);

border-radius:16px;

padding:32px;

width:360px;

display:flex;

flex-direction:column;

gap:16px;

}

.login-input{

background:#000;

border:1px solid var(--border);

border-radius:10px;

color:var(--accent);

padding:14px;

outline:none;

text-align:center;

font-size:18px;

}

.login-btn{

background:var(--accent);

border:none;

padding:14px;

border-radius:10px;

font-weight:bold;

cursor:pointer;

}

#dashboard{
display:none;
}

.header{

height:60px;

border-bottom:
1px solid var(--border);

display:flex;

align-items:center;

justify-content:space-between;

padding:0 24px;

position:sticky;

top:0;

background:
rgba(5,5,5,0.9);

backdrop-filter:blur(10px);

z-index:100;

}

.container{

max-width:1400px;

margin:24px auto;

padding:0 20px;

}

.kpi-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:16px;

margin-bottom:32px;

}

.kpi-card{

background:var(--card);

border:1px solid var(--border);

border-radius:16px;

padding:20px;

position:relative;

overflow:hidden;

}

.kpi-card::after{

content:'';

position:absolute;

top:0;
left:0;

width:4px;
height:100%;

background:var(--accent);

}

.kpi-label{

font-size:10px;

color:var(--sub);

letter-spacing:0.1em;

text-transform:uppercase;

margin-bottom:8px;

}

.kpi-val{

font-size:28px;

font-weight:800;

}

.section{

background:var(--card);

border:1px solid var(--border);

border-radius:16px;

margin-bottom:24px;

overflow:hidden;

}

.section-header{

padding:16px 20px;

border-bottom:
1px solid var(--border);

font-size:12px;

font-weight:700;

}

.section-body{
padding:20px;
}

.tag-cloud{

display:flex;

flex-wrap:wrap;

gap:8px;

}

.tag-item{

background:
rgba(0,212,255,0.1);

border:
1px solid rgba(0,212,255,0.2);

color:var(--accent);

padding:4px 10px;

border-radius:20px;

font-size:11px;

}

.recent-table{

width:100%;

border-collapse:collapse;

font-size:11px;

}

.recent-table th{

text-align:left;

padding:12px 8px;

color:var(--sub);

border-bottom:
1px solid var(--border);

}

.recent-table td{

padding:12px 8px;

border-bottom:
1px solid var(--border);

}

.badge{

font-size:9px;

padding:2px 6px;

border-radius:4px;

font-weight:bold;

}

.bg-soft{

background:
rgba(162,136,255,0.2);

color:var(--accent-soft);

}

.bg-dual{

background:
rgba(52,199,89,0.2);

color:var(--accent-dual);

}

.flex{

display:grid;

grid-template-columns:
1fr 1fr;

gap:20px;

}

@media(max-width:900px){

.flex{
grid-template-columns:1fr;
}

.login-box{
width:90%;
}

}

</style>
</head>

<body>

<div id="loginScreen">

<div style="text-align:center">

<h2 style="color:var(--accent)">
PURE WATER ANALYTICS
</h2>

<p style="
color:var(--sub);
font-size:10px;
margin-top:4px;">

ADMIN INTERFACE

</p>

</div>

<div class="login-box">

<input
type="password"
id="passInput"
class="login-input"
placeholder="Passkey">

<button
onclick="login()"
class="login-btn">

認証

</button>

</div>

</div>



<div id="dashboard">

<div class="header">

<div style="
font-weight:bold;
letter-spacing:1px;">

SYSTEM MONITOR

</div>

<div
id="time"
style="
font-size:12px;
color:var(--sub)">

</div>

</div>



<div class="container">

<div class="kpi-grid">

<div class="kpi-card">

<div class="kpi-label">
総ユーザー数
</div>

<div class="kpi-val"
id="totalUser">
--
</div>

</div>



<div class="kpi-card">

<div class="kpi-label">
軟水器利用
</div>

<div class="kpi-val"
id="softenerUser"
style="color:var(--accent-soft)">
--
</div>

</div>



<div class="kpi-card">

<div class="kpi-label">
2連結
</div>

<div class="kpi-val"
id="dualUser"
style="color:var(--accent-dual)">
--
</div>

</div>



<div class="kpi-card">

<div class="kpi-label">
平均PPM
</div>

<div class="kpi-val"
id="avgPpm"
style="color:var(--accent-warn)">
--
</div>

</div>

</div>



<div class="section">

<div class="section-header">

人気施工タグ

</div>

<div class="section-body">

<div
id="tagCloud"
class="tag-cloud">

</div>

</div>

</div>



<div class="flex">

<div class="section">

<div class="section-header">
地域分布
</div>

<div class="section-body"
id="prefList">

</div>

</div>



<div class="section">

<div class="section-header">
軟水器メーカー
</div>

<div class="section-body"
id="softenerList">

</div>

</div>

</div>



<div class="section">

<div class="section-header">

最近アクティビティ

</div>

<div class="section-body"
style="padding:0">

<table class="recent-table">

<thead>

<tr>

<th>日時</th>
<th>構成</th>
<th>メーカー</th>
<th>PPM</th>
<th>生成量</th>
<th>交換周期</th>
<th>洗車時間</th>
<th>車種</th>
<th>地域</th>
<th>タグ</th>

</tr>

</thead>

<tbody id="logTable">

</tbody>

</table>

</div>

</div>

</div>

</div>



<script>

const API_URL='https://script.google.com/macros/s/AKfycbwnz-HMQHlkslJ3QGUwdpZWfu5FlL76kLA8Qr6217pmPlB037FuM2J1JES5Es6FN9Vl/exec';

let pass="";

function login(){

pass=
document
.getElementById(
'passInput'
).value;

document
.getElementById(
'loginScreen'
).style.display='none';

fetchData()

}



async function fetchData(){

try{

const res=
await fetch(
`${API_URL}?pass=${
encodeURIComponent(pass)
}`
);

const data=
await res.json();

if(data.error){

alert(
"認証失敗"
);

document
.getElementById(
'loginScreen'
).style.display='flex';

return;

}

document
.getElementById(
'dashboard'
).style.display='block';

render(data)

}catch(e){

alert(
"データ取得失敗"
)

}

}



function render(data){

clearExtra();



totalUser.innerText=
data.total||0;

softenerUser.innerText=
data.softenerCount||0;

dualUser.innerText=
data.dualCount||0;

avgPpm.innerText=
(data.avgPpm||0)
+"ppm";



addKPI(
"平均実生成量",
(data.avgRealOutput||0)
+"L"
);

addKPI(
"平均交換周期",
(data.avgResetDays||0)
+"日"
);

addKPI(
"平均洗車時間",
(data.avgWashTime||0)
+"分"
);



tagCloud.innerHTML=

(data.popularTags||[])
.map(t=>`

<div class="tag-item">

${t.name}

(${t.count})

</div>

`).join("");



prefList.innerHTML=

(data.prefectures||[])
.map(p=>`

<div style="
display:flex;
justify-content:
space-between;
margin-bottom:8px">

<div>
${p.name}
</div>

<div>
${p.count}
</div>

</div>

`).join("");



softenerList.innerHTML=

(data.softenerBrands||[])
.map(s=>`

<div style="
display:flex;
justify-content:
space-between;
margin-bottom:8px">

<div>
${s.name}
</div>

<div>
${s.count}
</div>

</div>

`).join("");



addSection(

"車種分析",

(data.carTypes||[])
.map(c=>`

<div class="tag-item">

${c.name}

(${c.count})

</div>

`).join("") ||

"データなし"

);



logTable.innerHTML=

(data.recent||[])
.map(r=>`

<tr>

<td>

${formatDate(
r.createdAt
)}

</td>

<td>

${r.softenerBrand
?'<span class="badge bg-soft">SOFT</span>'
:''}

${r.dual===true||
r.dual==='true'
?'<span class="badge bg-dual">DUAL</span>'
:''}

</td>

<td>

<div style="
font-weight:bold">

${r.manufacturer||'-'}

</div>

<div style="
font-size:9px;
color:var(--sub)">

${r.subManufacturer||''}

</div>

</td>

<td>

${r.ppm||'-'}

</td>

<td>

${r.realOutput||'-'}L

</td>

<td>

${r.daysToReset||'-'}日

</td>

<td>

${r.washTime||'-'}分

</td>

<td>

${r.carName||'-'}

</td>

<td>

${r.region||'-'}

</td>

<td>

${Array.isArray(r.tags)
?r.tags.join(' / ')
:'-'}

</td>

</tr>

`).join("");

}



function addKPI(
label,
value
){

const div=
document
.createElement(
'div'
);

div.className=
'kpi-card extra-kpi';

div.innerHTML=`

<div class="kpi-label">

${label}

</div>

<div class="kpi-val">

${value}

</div>

`;

document
.querySelector(
'.kpi-grid'
)
.appendChild(
div
);

}



function addSection(
title,
body
){

const div=
document
.createElement(
'div'
);

div.className=
'section extra-section';

div.innerHTML=`

<div class="section-header">

${title}

</div>

<div class="section-body">

${body}

</div>

`;

document
.querySelector(
'.container'
)
.appendChild(
div
);

}



function clearExtra(){

document
.querySelectorAll(
'.extra-kpi,.extra-section'
)
.forEach(
e=>e.remove()
);

}



function formatDate(v){

if(!v)return'-';

const d=
new Date(v);

if(isNaN(d))
return v;

return d
.toLocaleString(
'ja-JP'
);

}



setInterval(()=>{

const t=
document
.getElementById(
'time'
);

if(t){

t.innerText=
new Date()
.toLocaleString(
'ja-JP'
);

}

},1000);

</script>

</body>
</html>
