<script>
const API_URL='https://script.google.com/macros/s/AKfycbwnz-HMQHlkslJ3QGUwdpZWfu5FlL76kLA8Qr6217pmPlB037FuM2J1JES5Es6FN9Vl/exec';

let pass="";

function login(){
  pass=document.getElementById('passInput').value;
  document.getElementById('loginScreen').style.display='none';
  fetchData();
}

async function fetchData(){
  try{
    const res=await fetch(`${API_URL}?pass=${encodeURIComponent(pass)}`);
    const data=await res.json();

    if(data.error){
      alert("認証失敗または取得失敗: "+data.error);
      document.getElementById('loginScreen').style.display='flex';
      return;
    }

    document.getElementById('dashboard').style.display='block';
    render(data);

  }catch(e){
    alert("データ取得失敗");
  }
}

function render(data){

  document.getElementById('totalUser').innerText=data.total||0;
  document.getElementById('softenerUser').innerText=data.softenerCount||0;
  document.getElementById('dualUser').innerText=data.dualCount||0;
  document.getElementById('avgPpm').innerText=(data.avgPpm||0)+'ppm';

  clearExtraSections();

  addKPI("平均実生成量",(data.avgRealOutput||0)+"L");
  addKPI("平均交換周期",(data.avgResetDays||0)+"日");
  addKPI("平均洗車時間",(data.avgWashTime||0)+"分");

  document.getElementById('tagCloud').innerHTML=
    (data.popularTags||[]).map(t=>`
      <div class="tag-item">${t.name} (${t.count})</div>
    `).join('') || '<div style="color:var(--sub);font-size:11px;">データなし</div>';

  document.getElementById('prefList').innerHTML=
    (data.prefectures||[]).map(p=>`
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <span>${p.name}</span>
        <b>${p.count}</b>
      </div>
    `).join('') || '<div style="color:var(--sub);font-size:11px;">データなし</div>';

  document.getElementById('softenerList').innerHTML=
    (data.softenerBrands||[]).map(s=>`
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <span>${s.name}</span>
        <b>${s.count}</b>
      </div>
    `).join('') || '<div style="color:var(--sub);font-size:11px;">データなし</div>';

  addSection("車種トレンド",
    (data.carTypes||[]).map(c=>`
      <div class="tag-item">${c.name} (${c.count})</div>
    `).join('') || 'データなし'
  );

  addSection("分析サマリー",`
    <div>平均PPM：${data.avgPpm||0}ppm</div>
    <div>平均実生成量：${data.avgRealOutput||0}L</div>
    <div>平均交換周期：${data.avgResetDays||0}日</div>
    <div>平均洗車時間：${data.avgWashTime||0}分</div>
    <div>軟水器利用数：${data.softenerCount||0}</div>
    <div>2連結利用数：${data.dualCount||0}</div>
  `);

  const table=document.querySelector('.recent-table');
  table.innerHTML=`
    <thead>
      <tr>
        <th>日時</th>
        <th>構成</th>
        <th>メーカー</th>
        <th>PPM</th>
        <th>実生成量</th>
        <th>交換周期</th>
        <th>洗車時間</th>
        <th>車種</th>
        <th>地域</th>
        <th>タグ</th>
      </tr>
    </thead>
    <tbody id="logTable"></tbody>
  `;

  document.getElementById('logTable').innerHTML=
    (data.recent||[]).map(r=>`
      <tr>
        <td style="color:var(--sub)">${formatDate(r.createdAt)}</td>
        <td>
          ${r.softenerBrand||r.softenerPPM ? '<span class="badge bg-soft">SOFT</span>' : ''}
          ${r.dual===true||r.dual==='true' ? '<span class="badge bg-dual">DUAL</span>' : ''}
        </td>
        <td>
          <div style="font-weight:bold">${r.manufacturer||'-'}</div>
          <div style="font-size:9px;color:var(--sub)">${r.subManufacturer||''}</div>
        </td>
        <td style="color:var(--accent-warn)">${r.ppm||'-'}</td>
        <td>${r.realOutput||'-'}L</td>
        <td>${r.daysToReset||'-'}日</td>
        <td>${r.washTime||'-'}分</td>
        <td>${r.carName||'-'}</td>
        <td>${r.region||'-'}</td>
        <td>${Array.isArray(r.tags)?r.tags.join(' / '):'-'}</td>
      </tr>
    `).join('');
}

function addKPI(label,value){
  const div=document.createElement("div");
  div.className="kpi-card extra-kpi";
  div.innerHTML=`
    <div class="kpi-label">${label}</div>
    <div class="kpi-val">${value}</div>
  `;
  document.querySelector(".kpi-grid").appendChild(div);
}

function addSection(title,body){
  const div=document.createElement("div");
  div.className="section extra-section";
  div.innerHTML=`
    <div class="section-header">${title}</div>
    <div class="section-body">${body}</div>
  `;
  document.querySelector(".container").appendChild(div);
}

function clearExtraSections(){
  document.querySelectorAll('.extra-kpi,.extra-section').forEach(el=>el.remove());
}

function formatDate(v){
  if(!v) return '-';
  const d=new Date(v);
  if(isNaN(d)) return v;
  return d.toLocaleString('ja-JP');
}

setInterval(()=>{
  const t=document.getElementById('time');
  if(t) t.innerText=new Date().toLocaleString('ja-JP');
},1000);
</script>
