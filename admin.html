<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pure-water admin</title>
    <style>
        :root {
            --bg: #080c10;
            --card: #0d1117;
            --border: #1c2a3a;
            --accent: #00d4ff;
            --accent2: #34c759;
            --accent3: #ffcc00;
            --accent4: #ff453a;
            --text: #e6edf3;
            --sub: #7d8590;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0;
        }
        #loginScreen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 40px 20px;
        }
        .login-logo { font-size: 11px; letter-spacing: 0.3em; color: var(--sub); text-transform: uppercase; margin-bottom: 8px; }
        .login-title { font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: -0.02em; text-shadow: 0 0 40px rgba(0,212,255,0.4); }
        .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 16px; }
        .login-input { background: #0a0f15; border: 1px solid var(--border); border-radius: 10px; color: var(--accent); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 16px; padding: 14px 16px; width: 100%; letter-spacing: 0.1em; outline: none; transition: border-color 0.2s; }
        .login-input:focus { border-color: var(--accent); }
        .login-btn { background: var(--accent); color: #000; border: none; border-radius: 10px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; padding: 14px; cursor: pointer; transition: opacity 0.2s; }
        .login-btn:active { opacity: 0.8; }
        .login-error { font-size: 11px; color: var(--accent4); text-align: center; display: none; }
        #dashboard { display: none; }
        .dash-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .dash-logo { font-size: 11px; letter-spacing: 0.25em; color: var(--accent); text-transform: uppercase; }
        .dash-time { font-size: 10px; color: var(--sub); letter-spacing: 0.05em; }
        .dash-body { padding: 24px 20px; max-width: 800px; margin: 0 auto; }
        .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
        .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px 16px; text-align: center; }
        .kpi-label { font-size: 9px; color: var(--sub); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
        .kpi-val { font-size: 32px; font-weight: 700; color: var(--accent); line-height: 1; }
        .kpi-val.green { color: var(--accent2); }
        .kpi-val.yellow { color: var(--accent3); }
        .kpi-val.blue { color: var(--accent); }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
        .section-header { padding: 14px 18px; border-bottom: 1px solid var(--border); font-size: 10px; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; }
        .section-body { padding: 16px 18px; }
        .rank-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .rank-row:last-child { border-bottom: none; }
        .rank-no { font-size: 10px; color: var(--sub); width: 20px; text-align: right; flex-shrink: 0; }
        .rank-name { font-size: 11px; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rank-bar-wrap { flex: 2; background: #0a0f15; border-radius: 4px; height: 6px; overflow: hidden; }
        .rank-bar { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.8s cubic-bezier(0.23,1,0.32,1); }
        .rank-val { font-size: 11px; color: var(--accent); width: 60px; text-align: right; flex-shrink: 0; }
        .rank-count { font-size: 9px; color: var(--sub); width: 40px; text-align: right; flex-shrink: 0; }
        .ppm-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
        .ppm-label { font-size: 10px; color: var(--sub); width: 70px; flex-shrink: 0; }
        .ppm-bar-wrap { flex: 1; background: #0a0f15; border-radius: 4px; height: 6px; overflow: hidden; }
        .ppm-bar { height: 100%; border-radius: 4px; background: var(--accent3); }
        .ppm-val { font-size: 10px; color: var(--sub); width: 30px; text-align: right; flex-shrink: 0; }
        .pref-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .pref-tag { background: #0a0f15; border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; font-size: 10px; color: var(--sub); display: flex; gap: 6px; align-items: center; }
        .pref-tag span { color: var(--accent2); font-weight: bold; }
        .recent-row { display: grid; grid-template-columns: 60px 1fr 45px 55px 55px 55px 45px; gap: 6px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 10px; align-items: center; }
        .recent-row:last-child { border-bottom: none; }
        .recent-row.header { color: var(--sub); font-size: 9px; letter-spacing: 0.1em; padding-bottom: 6px; }
        .founder-badge { font-size: 8px; background: rgba(255,204,0,0.15); color: var(--accent3); border: 1px solid rgba(255,204,0,0.3); border-radius: 4px; padding: 1px 5px; margin-left: 4px; }
        .dual-badge { font-size: 8px; background: rgba(0,212,255,0.15); color: var(--accent); border: 1px solid rgba(0,212,255,0.3); border-radius: 4px; padding: 1px 5px; }
        .ver-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
        .ver-row:last-child { border-bottom: none; }
        .ver-key { color: var(--sub); }
        .ver-val { color: var(--accent2); }
        .refresh-btn { background: none; border: 1px solid var(--border); color: var(--sub); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; letter-spacing: 0.1em; padding: 6px 14px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
        .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 10px; color: var(--sub); letter-spacing: 0.2em; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div>
        <div class="login-logo">pure-water-tracker</div>
        <div class="login-title">ADMIN</div>
    </div>
    <div class="login-box">
        <input type="password" id="passInput" class="login-input" placeholder="password" autocomplete="off">
        <button class="login-btn" onclick="login()">ENTER</button>
        <div class="login-error" id="loginError">認証に失敗しました</div>
    </div>
</div>

<div id="loading" style="display:none; min-height:100vh; align-items:center; justify-content:center; flex-direction:column; gap:16px;">
    <div class="spinner"></div>
    <div class="loading-text">LOADING DATA...</div>
</div>

<div id="dashboard">
    <div class="dash-header">
        <div class="dash-logo">⚡ pure-water admin</div>
        <div style="display:flex; align-items:center; gap:12px;">
            <div class="dash-time" id="dashTime"></div>
            <button class="refresh-btn" onclick="loadData()">↻ 更新</button>
        </div>
    </div>
    <div class="dash-body">
        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="kpi-label">総登録者</div>
                <div class="kpi-val" id="kpiTotal">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">創設メンバー</div>
                <div class="kpi-val yellow" id="kpiFounder">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">井戸水ユーザー</div>
                <div class="kpi-val green" id="kpiWell">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">2連結ユーザー</div>
                <div class="kpi-val blue" id="kpiDual">--</div>
            </div>
        </div>
        <div class="section">
            <div class="section-header">メーカー別 平均生成量ランキング</div>
            <div class="section-body" id="modelRanking"></div>
        </div>
        <div class="section">
            <div class="section-header">2連結 組み合わせランキング</div>
            <div class="section-body" id="dualRanking"></div>
        </div>
        <div class="section">
            <div class="section-header">水道水硬度（ppm帯）分布</div>
            <div class="section-body" id="ppmDist"></div>
        </div>
        <div class="section">
            <div class="section-header">都道府県分布</div>
            <div class="section-body" id="prefDist"></div>
        </div>
        <div class="section">
            <div class="section-header">市区町村分布</div>
            <div class="section-body" id="cityDist"></div>
        </div>
        <div class="section">
            <div class="section-header">アプリバージョン分布</div>
            <div class="section-body" id="verDist"></div>
        </div>
        <div class="section">
            <div class="section-header">直近登録 20件</div>
            <div class="section-body" id="recentList"></div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwnz-HMQHlkslJ3QGUwdpZWfu5FlL76kLA8Qr6217pmPlB037FuM2J1JES5Es6FN9Vl/exec';
    let adminPass = '';

    setInterval(() => {
        const el = document.getElementById('dashTime');
        if (el) el.textContent = new Date().toLocaleString('ja-JP');
    }, 1000);

    document.getElementById('passInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
    });

    async function login() {
        const pass = document.getElementById('passInput').value.trim();
        if (!pass) return;
        adminPass = pass;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('loading').style.display = 'flex';
        await loadData();
    }

    async function loadData() {
        try {
            const res = await fetch(`${GAS_URL}?pass=${encodeURIComponent(adminPass)}`);
            const data = await res.json();
            if (data.error === 'unauthorized') {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('passInput').value = '';
                adminPass = '';
                return;
            }
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            renderDashboard(data);
        } catch(e) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('loginError').style.display = 'block';
            document.getElementById('loginError').textContent = '通信エラーが発生しました';
        }
    }

    function renderDashboard(data) {
        document.getElementById('kpiTotal').textContent = data.total ?? '--';
        document.getElementById('kpiFounder').textContent = data.founderCount ?? '--';
        document.getElementById('kpiWell').textContent = data.wellWaterCount ?? '--';
        document.getElementById('kpiDual').textContent = data.dualCount ?? '--';

        const modelEl = document.getElementById('modelRanking');
        if (data.modelRanking && data.modelRanking.length > 0) {
            const maxAvg = Math.max(...data.modelRanking.map(r => r.avg));
            modelEl.innerHTML = data.modelRanking.map((r, i) => `
                <div class="rank-row">
                    <div class="rank-no">${i + 1}</div>
                    <div class="rank-name">${r.name}</div>
                    <div class="rank-bar-wrap">
                        <div class="rank-bar" style="width:${Math.round((r.avg / maxAvg) * 100)}%"></div>
                    </div>
                    <div class="rank-val">${r.avg.toLocaleString()}L</div>
                    <div class="rank-count">${r.count}件</div>
                </div>
            `).join('');
        } else {
            modelEl.innerHTML = '<div style="font-size:11px; color:var(--sub); text-align:center; padding:12px;">データなし</div>';
        }

        const dualEl = document.getElementById('dualRanking');
        if (data.dualMap && Object.keys(data.dualMap).length > 0) {
            const sorted = Object.entries(data.dualMap).sort((a, b) => b[1] - a[1]);
            const maxCount = sorted[0][1];
            dualEl.innerHTML = sorted.map(([combo, count], i) => `
                <div class="rank-row">
                    <div class="rank-no">${i + 1}</div>
                    <div class="rank-name">${combo}</div>
                    <div class="rank-bar-wrap">
                        <div class="rank-bar" style="width:${Math.round((count / maxCount) * 100)}%; background:var(--accent);"></div>
                    </div>
                    <div class="rank-count">${count}件</div>
                </div>
            `).join('');
        } else {
            dualEl.innerHTML = '<div style="font-size:11px; color:var(--sub); text-align:center; padding:12px;">データなし</div>';
        }

        const ppmEl = document.getElementById('ppmDist');
        if (data.ppmBands) {
            const total = Object.values(data.ppmBands).reduce((a, b) => a + b, 0);
            ppmEl.innerHTML = Object.entries(data.ppmBands).map(([label, count]) => `
                <div class="ppm-row">
                    <div class="ppm-label">${label} ppm</div>
                    <div class="ppm-bar-wrap">
                        <div class="ppm-bar" style="width:${total > 0 ? Math.round((count/total)*100) : 0}%"></div>
                    </div>
                    <div class="ppm-val">${count}</div>
                </div>
            `).join('');
        }

        const prefEl = document.getElementById('prefDist');
        if (data.prefMap && Object.keys(data.prefMap).length > 0) {
            const sorted = Object.entries(data.prefMap).sort((a, b) => b[1] - a[1]);
            prefEl.innerHTML = '<div class="pref-grid">' +
                sorted.map(([pref, count]) =>
                    `<div class="pref-tag">${pref}<span>${count}</span></div>`
                ).join('') +
            '</div>';
        } else {
            prefEl.innerHTML = '<div style="font-size:11px; color:var(--sub); text-align:center; padding:12px;">データなし</div>';
        }

        const cityEl = document.getElementById('cityDist');
        if (data.cityMap && Object.keys(data.cityMap).length > 0) {
            const sorted = Object.entries(data.cityMap).sort((a, b) => b[1] - a[1]);
            cityEl.innerHTML = '<div class="pref-grid">' +
                sorted.map(([city, count]) =>
                    `<div class="pref-tag">${city}<span>${count}</span></div>`
                ).join('') +
            '</div>';
        } else {
            cityEl.innerHTML = '<div style="font-size:11px; color:var(--sub); text-align:center; padding:12px;">データなし</div>';
        }

        const verEl = document.getElementById('verDist');
        if (data.versionMap) {
            verEl.innerHTML = Object.entries(data.versionMap)
                .sort((a, b) => b[1] - a[1])
                .map(([ver, count]) => `
                    <div class="ver-row">
                        <div class="ver-key">${ver}</div>
                        <div class="ver-val">${count}件</div>
                    </div>
                `).join('');
        }

        const recentEl = document.getElementById('recentList');
        if (data.recent && data.recent.length > 0) {
            recentEl.innerHTML =
                '<div class="recent-row header"><div>日付</div><div>メーカー</div><div>ppm</div><div>生成量</div><div>都道府県</div><div>市区町村</div><div>2連結</div></div>' +
                data.recent.map(r => `
                    <div class="recent-row">
                        <div style="color:var(--sub)">${r.date}</div>
                        <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                            ${r.manufacturer || '--'}
                            ${r.isFounder ? `<span class="founder-badge">🏅${r.memberNo}</span>` : ''}
                        </div>
                        <div style="color:var(--sub)">${r.ppm || '--'}</div>
                        <div style="color:var(--accent2)">${r.liters ? r.liters + 'L' : '--'}</div>
                        <div style="color:var(--sub)">${r.prefecture || '--'}</div>
                        <div style="color:var(--sub)">${r.city || '--'}</div>
                        <div>${r.isDual ? '<span class="dual-badge">🔗</span>' : ''}</div>
                    </div>
                `).join('');
        } else {
            recentEl.innerHTML = '<div style="font-size:11px; color:var(--sub); text-align:center; padding:12px;">データなし</div>';
        }
    }
</script>
</body>
</html>
